<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Birthday Gift</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <!-- STARS -->
  <div class="stars"></div>

  <!-- PAGE 1 -->
  <section class="page active" id="page1">

    <h1 class="main-title">
      Happy Birthday
    </h1>

    <div class="love">
      ❤
    </div>

    <button onclick="nextPage(2)">
      OPEN
    </button>

  </section>


  <!-- PAGE 2 -->
  <section class="page" id="page2">

    <div class="letter">
      F
    </div>

    <div class="line"></div>

    <p class="small-text">
      loading your surprise...
    </p>

  </section>


  <!-- PAGE 3 -->
  <section class="page" id="page3">

    <p class="invite">
      YOU ARE CORDIALLY INVITED
    </p>

    <h1 class="surprise-title">
      A Little Surprise
      <span>Made With Love</span>
    </h1>

    <button onclick="startCountdown()">
      CONTINUE
    </button>

  </section>


  <!-- PAGE 4 -->
  <section class="page" id="page4">

    <div class="countdown" id="countdown">
      3
    </div>

  </section>


  <!-- PAGE 5 -->
  <section class="page" id="page5">

    <div class="grid-gallery">

      <!-- FOTO 1 -->
      <div class="photo"
      onclick="openMessage(
      'foto1.jpg',
      'Selamat ulang tahun yaa 💖 Semoga semua hal baik selalu datang ke hidup kamu.'
      )">

        <img src="foto1.jpg">

      </div>


      <!-- FOTO 2 -->
      <div class="photo"
      onclick="openMessage(
      'foto2.jpg',
      'Terima kasih karena sudah bertahan sampai sejauh ini dan tetap jadi orang baik.'
      )">

        <img src="foto2.jpg">

      </div>


      <!-- FOTO 3 -->
      <div class="photo"
      onclick="openMessage(
      'foto3.jpg',
      'Aku harap di umur yang baru ini kamu selalu bahagia dan dikelilingi orang tulus.'
      )">

        <img src="foto3.jpg">

      </div>


      <!-- FOTO 4 -->
      <div class="photo"
      onclick="openMessage(
      'foto4.jpg',
      'Happy Birthday untuk orang paling spesial ✨ Jangan pernah kehilangan senyummu.'
      )">

        <img src="foto4.jpg">

      </div>

    </div>

  </section>


  <!-- POPUP -->
  <div class="popup" id="popup">

    <div class="popup-card">

      <img id="popup-img">

      <div class="popup-text">

        <h2>For You 💌</h2>

        <p id="popup-message"></p>

        <button onclick="closePopup()">
          Close
        </button>

      </div>

    </div>

  </div>


  <!-- MUSIC -->
  <audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
